name: Upload Python Package

# The tag is now triggered by the Github App: CommitizenBot
on:
  push:
    tags:
      - "v*"
  # Manual trigger for republishing a specific tag if the original push-on-tag
  # run failed and is now too old to be re-run via the GitHub UI (#1790).
  # ``ref`` should be a tag name like ``v4.11.1``.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to republish (e.g., v4.11.1)"
        required: true
        type: string

jobs:
  deploy:
    if: ${{ github.repository == 'commitizen-tools/commitizen' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref_name }}
      - name: Set up Python
        uses: astral-sh/setup-uv@v7
      - name: Build
        run: uv build
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
